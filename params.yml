data:
  raw_path: "ml_pipeline/data/raw/user_events.csv"
  processed_path: "ml_pipeline/data/processed/"
  test_size: 0.2
  random_seed: 42

features:
  engineering:
    session_features: true
    time_features: true
    engagement_metrics: true
    emotion_encoding: true
  feature_list:
    - session_frequency
    - avg_session_length
    - engagement_ratio
    - click_rate
    - time_between_sessions
    - dominant_emotion
    - device_type_encoded

models:
  churn:
    type: "random_forest"
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
  
  recommender:
    type: "collaborative_filtering"
    n_factors: 50
    learning_rate: 0.01
    regularization: 0.1
    iterations: 20
  
  anomaly:
    type: "isolation_forest"
    contamination: 0.1
    random_state: 42
  
  forecast:
    type: "prophet"
    seasonality_mode: "multiplicative"
    yearly_seasonality: true
    weekly_seasonality: true
    daily_seasonality: false

training:
  batch_size: 32
  epochs: 10
  validation_split: 0.2
  early_stopping_patience: 3

monitoring:
  drift_threshold: 0.05
  accuracy_threshold: 0.7
  alert_channels:
    - email
    - slack

deployment:
  environment: "development"
  api_version: "v1"
  replicas: 2