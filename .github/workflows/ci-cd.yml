name: RenAI Complete CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.9'

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        pip install black flake8 pylint
    - name: Black check
      run: black --check backend/ ml_pipeline/
    - name: Flake8
      run: flake8 backend/ ml_pipeline/ --count --max-complexity=10 --statistics
  tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        pip install pytest pytest-cov
        pip install -r requirements.txt
    - name: Create dummy test
      run: |
        mkdir -p tests
        echo 'def test_placeholder(): assert True' > tests/test_placeholder.py
    - name: Run tests
      run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker image
      run: docker build -f docker/backend/Dockerfile -t renai-backend:latest .
