name: RenAI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Daily 2 AM build

env:
  PYTHON_VERSION: '3.9'
  AZURE_WEBAPP_NAME: renai-api  # For Azure deployment
  GCP_PROJECT_ID: renai-project   # For GCP deployment

jobs:
  # JOB 1: Code Quality Checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install black flake8 pylint
        pip install -r requirements.txt
    
    - name: Check formatting with Black
      run: black --check .
    
    - name: Lint with Flake8
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Lint with Pylint
      run: pylint --fail-under=8.0 backend/ ml_pipeline/

  # JOB 2: Tests
  tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install pytest pytest-cov
        pip install -r requirements.txt
    
    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=./ --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests

  # JOB 3: ML Pipeline Validation
  ml-pipeline:
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Validate data with DVC
      run: |
        dvc pull || true  # Pull if remote exists
        dvc status
    
    - name: Quick model validation
      run: |
        python ml_pipeline/src/validate_models.py
    
    - name: MLflow experiment tracking
      run: |
        mlflow experiments create -n "CI-$(date +%Y%m%d)" || true

  # JOB 4: Build and Push Docker Image
  docker-build:
    runs-on: ubuntu-latest
    needs: [tests, ml-pipeline]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push API image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/renai-api:latest
          ${{ secrets.DOCKER_USERNAME }}/renai-api:${{ github.sha }}
    
    - name: Build and push Frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: docker/frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/renai-frontend:latest

  # JOB 5: Deploy to Azure (Optional - Professor's Requirement)
  deploy-azure:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: '${{ secrets.DOCKER_USERNAME }}/renai-api:latest'

  # JOB 6: Deploy to GCP (For Jenkins Integration)
  deploy-gcp:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy renai-api \
          --image ${{ secrets.DOCKER_USERNAME }}/renai-api:latest \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated

  # JOB 7: Notify on Completion
  notify:
    runs-on: ubuntu-latest
    needs: [code-quality, tests, ml-pipeline, docker-build]
    if: always()
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}